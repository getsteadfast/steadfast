name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deployment. Don't cancel in-flight deploys; let them
# finish so Pages is never left in a half-applied state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build (mkdocs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed if you later enable git-revision-date plugin

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "mkdocs==1.6.1" \
            "mkdocs-material==9.5.49" \
            "pymdown-extensions==10.12"

      # NOTE: --strict was disabled because docs/index.md contains
      # relative links to repo-level files (examples/, LICENSE, source
      # under steadfast/) that aren't part of the mkdocs site tree.
      # Convert those links to absolute github.com URLs in a follow-up,
      # then re-enable --strict so broken nav targets fail the build.
      - name: Build site
        run: mkdocs build --site-dir _site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
