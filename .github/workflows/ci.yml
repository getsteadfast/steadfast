name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, type-check & test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    env:
      PLAYWRIGHT_CACHE_VERSION: v1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with dev + health extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,health]"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-py${{ matrix.python-version }}-${{ env.PLAYWRIGHT_CACHE_VERSION }}

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy --strict)
        run: mypy --strict steadfast/

      - name: Run unit tests
        run: pytest

      - name: Run integration tests (real browser)
        run: pytest -m integration
